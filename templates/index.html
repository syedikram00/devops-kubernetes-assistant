<!DOCTYPE html>
<html>
<head>
    <title>DevOps Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="topbar">
        <div class="topbar-inner">
            <div class="brand">
                <span class="brand-dot"></span>
                <span class="brand-text">DevOps Assistant</span>
            </div>
            <span class="brand-tag">read-only cluster agent</span>
        </div>
    </div>
    <div class="container">
        <div id="chat" class="chat-window">
            <div class="message assistant">
                <span class="msg-label">assistant</span>
                Ask me about your cluster — pods, logs, deployments, services.
            </div>
        </div>
        <form id="chat-form" class="chat-form">
            <input type="text" id="prompt-input" placeholder="e.g. Why is my-pod crashing?" autocomplete="off" required>
            <button type="submit">
                <span>Send</span>
            </button>
        </form>
    </div>
    <script>
        const form = document.getElementById('chat-form');
        const input = document.getElementById('prompt-input');
        const chat = document.getElementById('chat');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const prompt = input.value;
            addMessage(prompt, 'user');
            input.value = '';
            const loadingMsg = addMessage('Thinking...', 'assistant', true);

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt })
                });
                const data = await res.json();
                loadingMsg.querySelector('.msg-body').textContent = data.answer;
                loadingMsg.classList.remove('loading');
            } catch (err) {
                loadingMsg.querySelector('.msg-body').textContent = 'Error reaching the assistant.';
                loadingMsg.classList.remove('loading');
            }
        });

        function addMessage(text, role, loading = false) {
            const div = document.createElement('div');
            div.className = `message ${role}${loading ? ' loading' : ''}`;
            div.innerHTML = `<span class="msg-label">${role}</span><span class="msg-body">${text}</span>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }
    </script>
</body>
</html>
